<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGREJA EMUNAH</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

.hero {
  height: 100vh;
  background: url('bg.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ESCURECIMENTO PROFISSIONAL */
.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
}

/* CONTEÚDO */
.content {
  position: relative;
  text-align: center;
  color: white;
  padding: 20px;
  max-width: 600px;
}

h1 {
  font-size: 45px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.highlight {
  color: gold;
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 15px;
}

p {
  font-size: 16px;
  margin: 8px 0;
}

/* BOTÕES */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 20px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.whatsapp {
  background: #25D366;
  color: white;
}

.maps {
  background: #4285F4;
  color: white;
}

.btn:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="hero">

  <div class="content">

    <h1>IGREJA EMUNAH</h1>

    <div class="highlight">Nesta quinta</div>

    <p>Você é nosso convidado especial 🙏</p>
    <p>Venha viver uma experiência com Deus</p>

    <p>📍 R. Albatroz N° 301 - Esplanada 3</p>

    <!-- WHATSAPP -->
    <a class="btn whatsapp" href="https://wa.me/5500000000000" target="_blank">
      Confirmar Presença
    </a>

    <br>

    <!-- MAPS -->
    <a class="btn maps" href="https://www.google.com/maps/search/R.+Albatroz+301+Esplanada+3" target="_blank">
      Abrir Localização
    </a>

  </div>

</div>

</body>
</html>
