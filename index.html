<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMUNAH - Culto</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

#bg {
  width: 100%;
  height: 100vh;
  background: black;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay {
  background: rgba(0,0,0,0.7);
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  color: white;
}

h1 { font-size: 35px; }
p { font-size: 18px; }

.btn {
  margin-top: 10px;
  padding: 12px;
  background: gold;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="bg">
  <div class="overlay">
    <h1>IGREJA EMUNAH</h1>
    <p>Você é nosso convidado!</p>
    <p><strong>Nesta quinta</strong></p>
    <p>Venha viver algo sobrenatural 🙏</p>
    <p>📍 R. Albatroz N° 301 - Esplanada 3</p>

    <input type="file" id="file">
  </div>
</div>

<script>
document.getElementById("file").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  document.getElementById("bg").style.backgroundImage = `url(${url})`;
});
</script>

</body>
</html>
